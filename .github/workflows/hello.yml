name: Welcome Action

on: [push, pull_request]

jobs:
  greet:
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Print greeting
        run: echo "Hello, GitHub Actions!"

      - name: Print current date
        run: date

      - name: Print system info
        run: uname -a

      - name: environment variables printing
        run:  echo "the enviroment is: ${{ vars.env }}"

      - name: Disk space check
        run: df -h

      - name: List files
        run: ls -la
